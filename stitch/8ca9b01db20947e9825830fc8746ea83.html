<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Record Editor - StackLens Canary Clean</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface-dim": "#0b1326",
                      "secondary": "#b9c8de",
                      "on-tertiary": "#472a00",
                      "on-background": "#dae2fd",
                      "secondary-fixed-dim": "#b9c8de",
                      "surface-container-high": "#222a3d",
                      "primary": "#8ed5ff",
                      "primary-fixed": "#c4e7ff",
                      "on-tertiary-fixed-variant": "#653e00",
                      "outline-variant": "#3e484f",
                      "on-secondary-container": "#a7b6cc",
                      "surface": "#0b1326",
                      "outline": "#87929a",
                      "background": "#0b1326",
                      "on-primary-fixed": "#001e2c",
                      "tertiary-fixed": "#ffddb8",
                      "error-container": "#93000a",
                      "on-primary-container": "#004965",
                      "surface-container-low": "#131b2e",
                      "on-surface": "#dae2fd",
                      "on-secondary-fixed": "#0d1c2d",
                      "on-error": "#690005",
                      "inverse-on-surface": "#283044",
                      "tertiary": "#ffc176",
                      "primary-container": "#38bdf8",
                      "surface-container": "#171f33",
                      "secondary-container": "#39485a",
                      "on-primary-fixed-variant": "#004c69",
                      "surface-variant": "#2d3449",
                      "error": "#ffb4ab",
                      "surface-container-lowest": "#060e20",
                      "tertiary-container": "#f1a02b",
                      "inverse-primary": "#00668a",
                      "on-secondary-fixed-variant": "#39485a",
                      "tertiary-fixed-dim": "#ffb960",
                      "on-primary": "#00354a",
                      "surface-tint": "#7bd0ff",
                      "on-tertiary-container": "#613b00",
                      "surface-container-highest": "#2d3449",
                      "on-surface-variant": "#bdc8d1",
                      "on-error-container": "#ffdad6",
                      "secondary-fixed": "#d4e4fa",
                      "inverse-surface": "#dae2fd",
                      "on-tertiary-fixed": "#2a1700",
                      "surface-bright": "#31394d",
                      "on-secondary": "#233143",
                      "primary-fixed-dim": "#7bd0ff"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "spacing": {
                      "stack-md": "8px",
                      "container-padding": "16px",
                      "stack-sm": "4px",
                      "stack-lg": "16px",
                      "unit": "4px",
                      "gutter": "12px"
              },
              "fontFamily": {
                      "headline-md": ["Inter"],
                      "label-sm": ["JetBrains Mono"],
                      "body-md": ["Inter"],
                      "body-sm": ["Inter"],
                      "label-md": ["JetBrains Mono"],
                      "headline-lg": ["Inter"]
              },
              "fontSize": {
                      "headline-md": ["20px", { "lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                      "label-sm": ["10px", { "lineHeight": "12px", "letterSpacing": "0.05em", "fontWeight": "500" }],
                      "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                      "body-sm": ["12px", { "lineHeight": "16px", "fontWeight": "400" }],
                      "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500" }],
                      "headline-lg": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "600" }]
              }
            }
          }
        }
    </script>
<style>
        body { background-color: #020617; color: #dae2fd; }
        .form-input { 
            background-color: #0b1326; 
            border: 1px solid #3e484f; 
            color: #dae2fd;
        }
        .form-input:focus {
            border-color: #8ed5ff;
            outline: none;
            box-shadow: 0 0 0 1px #8ed5ff;
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden font-body-md text-body-md">
<!-- SideNavBar -->
<nav class="hidden md:flex flex-col bg-surface-container-low dark:bg-surface-container-low border-r border-outline-variant h-full w-64 p-stack-lg gap-stack-md flex-shrink-0 z-10 ease-out duration-150">
<div class="mb-stack-lg">
<h1 class="font-headline-md text-headline-md text-on-surface">StackLens</h1>
<p class="font-label-sm text-label-sm text-on-surface-variant uppercase mt-1">Canary Clean</p>
</div>
<div class="flex-1 flex flex-col gap-unit">
<a class="flex items-center gap-stack-md px-3 py-2 text-on-surface-variant hover:bg-surface-variant rounded-lg transition-colors duration-150" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">dashboard</span>
<span class="font-label-md text-label-md">Operations</span>
</a>
<a class="flex items-center gap-stack-md px-3 py-2 bg-secondary-container text-on-secondary-container rounded-lg transition-colors duration-150" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">edit_note</span>
<span class="font-label-md text-label-md">Editor</span>
</a>
<a class="flex items-center gap-stack-md px-3 py-2 text-on-surface-variant hover:bg-surface-variant rounded-lg transition-colors duration-150" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">analytics</span>
<span class="font-label-md text-label-md">Insights</span>
</a>
</div>
<div class="flex flex-col gap-unit mt-auto border-t border-outline-variant pt-stack-md">
<a class="flex items-center gap-stack-md px-3 py-2 text-on-surface-variant hover:bg-surface-variant rounded-lg transition-colors duration-150" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">help</span>
<span class="font-label-md text-label-md">Support</span>
</a>
<a class="flex items-center gap-stack-md px-3 py-2 text-on-surface-variant hover:bg-surface-variant rounded-lg transition-colors duration-150" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">description</span>
<span class="font-label-md text-label-md">Documentation</span>
</a>
</div>
</nav>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col bg-[#020617] relative overflow-y-auto">
<!-- Header / Actions -->
<header class="flex justify-between items-center px-container-padding py-stack-md bg-[#0F172A] border-b border-outline-variant sticky top-0 z-20">
<div class="flex items-center gap-stack-md">
<a class="text-on-surface-variant hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">arrow_back</span>
</a>
<div>
<h2 class="font-headline-md text-headline-md text-on-surface">Edit Module Record</h2>
<p class="font-label-sm text-label-sm text-on-surface-variant uppercase mt-1">Unsaved changes</p>
</div>
</div>
<div class="flex gap-stack-md">
<button aria-label="Cancel" class="px-4 py-1.5 font-label-md text-label-md text-on-surface-variant border border-outline-variant rounded hover:bg-surface-variant transition-colors duration-150">
                    Cancel
                </button>
<button aria-label="Save Record" class="px-4 py-1.5 font-label-md text-label-md bg-[#475569] text-white rounded hover:bg-[#334155] transition-colors duration-150">
                    Save Record
                </button>
</div>
</header>
<!-- Form Area -->
<div class="p-container-padding max-w-3xl mx-auto w-full mt-stack-lg">
<div class="bg-[#0F172A] rounded-lg p-stack-lg border border-outline-variant">
<form class="flex flex-col gap-stack-lg">
<!-- Record Name -->
<div class="flex flex-col gap-unit">
<label class="font-label-md text-label-md text-on-surface flex items-center gap-1" for="recordName">
                            Record Name <span class="text-error">*</span>
</label>
<input class="form-input rounded h-8 px-2 font-body-sm text-body-sm" id="recordName" placeholder="e.g., Auth-Service-Node" type="text" value="Payment-Gateway-Beta"/>
<p class="font-body-sm text-body-sm text-error mt-1 hidden" id="nameError">Record Name is required.</p>
</div>
<!-- Module Type -->
<div class="flex flex-col gap-unit">
<label class="font-label-md text-label-md text-on-surface" for="moduleType">Module Type</label>
<select class="form-input rounded h-8 px-2 font-body-sm text-body-sm appearance-none" id="moduleType">
<option selected="" value="microservice">Microservice</option>
<option value="database">Database Cluster</option>
<option value="cache">Cache Node</option>
<option value="gateway">API Gateway</option>
</select>
</div>
<!-- Health Check Frequency & Risk Threshold -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-lg">
<div class="flex flex-col gap-unit">
<label class="font-label-md text-label-md text-on-surface" for="frequency">Health Check Frequency</label>
<div class="relative">
<input class="form-input rounded h-8 px-2 w-full font-body-sm text-body-sm" id="frequency" type="number" value="30"/>
<span class="absolute right-2 top-1.5 text-on-surface-variant font-label-sm text-label-sm">sec</span>
</div>
</div>
<div class="flex flex-col gap-unit">
<label class="font-label-md text-label-md text-on-surface" for="riskThreshold">Risk Threshold</label>
<div class="relative">
<select class="form-input rounded h-8 px-2 w-full font-body-sm text-body-sm appearance-none" id="riskThreshold">
<option value="low">Low (Tolerance: 5%)</option>
<option selected="" value="medium">Medium (Tolerance: 2%)</option>
<option value="high">High (Tolerance: &lt;1%)</option>
<option value="critical">Critical (Zero Tolerance)</option>
</select>
</div>
</div>
</div>
<!-- Description -->
<div class="flex flex-col gap-unit">
<label class="font-label-md text-label-md text-on-surface" for="description">Description (Optional)</label>
<textarea class="form-input rounded p-2 font-body-sm text-body-sm resize-none" id="description" placeholder="Provide operational context for this module..." rows="4"></textarea>
</div>
</form>
</div>
</div>
</main>
<script>
        // Simple interaction script
        document.getElementById('recordName').addEventListener('input', function(e) {
            const errorMsg = document.getElementById('nameError');
            if(e.target.value.trim() === '') {
                e.target.style.borderColor = '#ffb4ab';
                errorMsg.classList.remove('hidden');
            } else {
                e.target.style.borderColor = '#3e484f';
                errorMsg.classList.add('hidden');
            }
        });
    </script>
</body></html>
